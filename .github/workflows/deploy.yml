name: Build & Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy.yml'

env:
  PROJECT_ID: dmv-motor-prod
  REGION: us-west1
  REGISTRY: us-west1-docker.pkg.dev
  IMAGE: us-west1-docker.pkg.dev/dmv-motor-prod/dmv-motor/api

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dmv_motor_test
          POSTGRES_USER: dmv_motor
          POSTGRES_PASSWORD: dmv_motor
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        working-directory: apps/api
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/dmv_motor_test
          SPRING_DATASOURCE_USERNAME: dmv_motor
          SPRING_DATASOURCE_PASSWORD: dmv_motor
        run: mvn verify -Djooq.codegen.skip=true

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Docker image
        working-directory: apps/api
        run: |
          IMAGE_TAG="${{ env.IMAGE }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" -t "${{ env.IMAGE }}:latest" .
          docker push "$IMAGE_TAG"
          docker push "${{ env.IMAGE }}:latest"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy dmv-motor-api \
            --image "${{ env.IMAGE_TAG }}" \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --quiet

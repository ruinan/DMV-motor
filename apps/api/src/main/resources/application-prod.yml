spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      # Cloud Run is serverless — keep pool small to avoid exhausting Cloud SQL connections
      minimum-idle: 1
      maximum-pool-size: 5
      connection-timeout: 20000
      idle-timeout: 300000

  lifecycle:
    timeout-per-shutdown-phase: 25s  # graceful drain before Cloud Run kills container

server:
  shutdown: graceful

app:
  auth:
    firebase:
      # Prod default — StubFirebaseVerifier is replaced by FirebaseIdTokenVerifier.
      # Terraform also pins APP_AUTH_FIREBASE_ENABLED=true as the source of truth;
      # this line is a belt-and-suspenders default if the env var is ever missing.
      enabled: ${APP_AUTH_FIREBASE_ENABLED:true}
      # Required by firebase-admin verifyIdToken: Cloud Run does NOT auto-inject
      # GOOGLE_CLOUD_PROJECT, and ComputeEngineCredentials carries no project_id,
      # so we must hand it explicitly to FirebaseOptions.
      project-id: ${GOOGLE_CLOUD_PROJECT:dmv-motor-prod}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true        # enables /actuator/health/liveness and /actuator/health/readiness
      show-details: never    # don't leak DB details in public health response
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

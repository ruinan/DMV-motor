spring:
  application:
    name: dmv-motor-api
  # Application entry point — see docs/development/ for architecture.
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dmv_motor}
    username: ${DB_USERNAME:dmv_motor}
    password: ${DB_PASSWORD:dmv_motor}
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Readiness / completion engine parameters — see docs/parameters.md.
# docs/parameters.md §7 explicitly forbids hardcoding these; override per environment.
app:
  readiness:
    mock-average-threshold: 85
    mock-minimum-count: 2
    key-coverage-threshold: 90
    review-completion-threshold: 80
    persistent-mistake-wrong-count: 2
    mock-weight: 40
    key-coverage-weight: 25
    high-risk-review-weight: 20
    recent-stability-weight: 15
    completion-key-coverage-weight: 50
    completion-high-risk-review-weight: 30
    completion-basic-practice-weight: 20
    ready-threshold: 80
    recent-practice-window: 20
    recent-accuracy-threshold: 85
  # Mastery evaluation — docs/parameters.md mastery_threshold (MVP subset).
  mastery:
    topic-correct-rate-threshold: 80
    recent-window: 8
    recent-correct-threshold: 6
  # AI explain endpoint — see docs/ai-architecture.md + progress decision §27.2.
  # Cooldown algorithm (decision #6 "thinking-time"): cooldown = min(base + N*increment, max)
  # where N = calls in past 24h. Bot scanners trip it; humans pacing real questions don't.
  # Cache hits (UNIQUE user/question/language) skip rate-limit entirely — no LLM cost.
  ai:
    enabled: true
    # provider: stub (default for dev/test — StubAiExplanationProvider with matchIfMissing=true)
    # Cloud Run flips this to "deepseek" via APP_AI_PROVIDER env (cloudrun.tf).
    provider: ${APP_AI_PROVIDER:stub}
    # Cooldown gates the *pace* of uncached AI calls (cache hits skip it). The
    # daily cap is the real cost ceiling; cooldown only stops machine-gun /
    # double-click bursts. The original 120s + 60s-per-call ramp made reviewing
    # several wrong answers in a row painful (wait 2-5 min between questions),
    # so it's relaxed to a flat ~10s with no ramp. Cost ceiling unchanged
    # (max-calls-per-day still 50). Abuse-by-mass-signup is handled later by the
    # anti-abuse / human-verification work, not by punishing real learners here.
    base-cooldown-seconds: 3
    cooldown-increment-seconds: 0
    max-cooldown-seconds: 10
    max-calls-per-day: 50
    # enhance1 "深入分析": a single question can be deep-dived at most this many
    # times (per language). Enforced server-side; survives a client cache clear.
    max-deep-dives-per-question: 10
    deepseek:
      # Local dev: drop the key into apps/api/.env (gitignored) as APP_AI_DEEPSEEK_API_KEY.
      # Prod: sourced from Secret Manager `deepseek-api-key` (cloudrun.tf env block).
      # Empty default keeps Spring Boot from failing to start when the provider
      # is "stub" (dev/test) and no key is set.
      api-key: ${APP_AI_DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      model: deepseek-chat
      max-tokens: 400
      timeout-seconds: 30
  # Stripe billing — per-exam monthly subscriptions via hosted Checkout.
  # "Enabled" is derived from the secret key being present (no separate flag):
  # without a key (dev/test default) the catalog falls back to the dev grant.
  # Prod sources the keys from Secret Manager via Cloud Run env.
  billing:
    stripe-secret-key: ${STRIPE_SECRET_KEY:}
    stripe-webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    success-url: ${APP_BILLING_SUCCESS_URL:http://localhost:3000/en/me?billing=success}
    cancel-url: ${APP_BILLING_CANCEL_URL:http://localhost:3000/en/me?billing=cancel}
    monthly-mock-quota: 30

  # reCAPTCHA Enterprise (bot / human verification). Disabled by default so dev
  # and tests run without a key; the guard is a no-op when disabled. Prod sets
  # APP_RECAPTCHA_ENABLED=true + the project/site key (Secret Manager via Cloud Run).
  recaptcha:
    enabled: ${APP_RECAPTCHA_ENABLED:false}
    project-id: ${APP_RECAPTCHA_PROJECT_ID:}
    site-key: ${APP_RECAPTCHA_SITE_KEY:}
    min-score: ${APP_RECAPTCHA_MIN_SCORE:0.5}

  # Activation-code redemption throttle (per authenticated user, in-memory sliding
  # window). High-entropy codes already make guessing infeasible; this is
  # defense-in-depth against an account machine-gunning the redeem endpoint.
  redeem:
    max-attempts: ${APP_REDEEM_MAX_ATTEMPTS:10}
    window-seconds: ${APP_REDEEM_WINDOW_SECONDS:300}

  # WeChat mini-program login (code2session). Absent in dev/test → WeChat login is
  # disabled (the gateway throws WECHAT_NOT_CONFIGURED). Prod sources these from
  # the family-entity mini-program via Secret Manager / Cloud Run env. NEVER commit.
  wechat:
    appid: ${APP_WECHAT_APPID:}
    secret: ${APP_WECHAT_SECRET:}

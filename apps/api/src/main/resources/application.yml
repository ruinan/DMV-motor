spring:
  application:
    name: dmv-motor-api
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dmv_motor}
    username: ${DB_USERNAME:dmv_motor}
    password: ${DB_PASSWORD:dmv_motor}
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
